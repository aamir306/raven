# RAVEN — config/model_routing.yaml
# Defines which LLM model to use for each pipeline stage
#
# Azure OpenAI: use deployment names (e.g. "gpt4o") not canonical names
# Direct OpenAI: use canonical names (e.g. "gpt-4o", "gpt-4o-mini")
#
# Current setup: Azure OpenAI with a single "gpt4o" deployment.
# When a "gpt4o-mini" deployment is created, update stages below.
#
# Stage names match the stage_name argument passed to OpenAIClient.complete().

stages:
  # ── Stage 1: Router ─────────────────────────────────────────────────
  router:
    model: gpt4o
    max_tokens: 50
    temperature: 0
    cost_per_call: 0.001

  # ── Stage 2: Information Retrieval ──────────────────────────────────
  ir_keyword_extract:
    model: gpt4o
    max_tokens: 300
    temperature: 0
    cost_per_call: 0.001

  # ── Stage 3: Schema Selection ───────────────────────────────────────
  ss_column_filter:
    model: gpt4o
    max_tokens: 1000
    temperature: 0
    cost_per_call: 0.001

  ss_table_select:
    model: gpt4o
    max_tokens: 800
    temperature: 0
    cost_per_call: 0.002

  ss_column_prune:
    model: gpt4o
    max_tokens: 600
    temperature: 0
    cost_per_call: 0.001

  # ── Stage 4: Probes ────────────────────────────────────────────────
  probe_decompose:
    model: gpt4o
    max_tokens: 500
    temperature: 0
    cost_per_call: 0.002

  probe_generate:
    model: gpt4o
    max_tokens: 500
    temperature: 0
    cost_per_call: 0.002

  # ── Stage 5: SQL Generation ─────────────────────────────────────────
  gen_simple:
    model: gpt4o
    max_tokens: 2000
    temperature: 0.0
    cost_per_call: 0.003

  gen_candidate_a:
    model: gpt4o
    max_tokens: 4000
    temperature: 0.3
    cost_per_call: 0.020

  gen_candidate_b:
    model: gpt4o
    max_tokens: 4000
    temperature: 0.3
    cost_per_call: 0.020

  gen_candidate_c:
    model: gpt4o
    max_tokens: 4000
    temperature: 0.3
    cost_per_call: 0.020

  gen_revision:
    model: gpt4o
    max_tokens: 4000
    temperature: 0
    cost_per_call: 0.020

  # ── Stage 6: Validation ────────────────────────────────────────────
  val_pairwise:
    model: gpt4o
    max_tokens: 200
    temperature: 0
    cost_per_call: 0.003

  val_taxonomy:
    model: gpt4o
    max_tokens: 500
    temperature: 0
    cost_per_call: 0.003

  # ── Stage 7: Output ────────────────────────────────────────────────
  out_chart:
    model: gpt4o
    max_tokens: 200
    temperature: 0
    cost_per_call: 0.001

  out_summary:
    model: gpt4o
    max_tokens: 300
    temperature: 0.3
    cost_per_call: 0.001

embeddings:
  model: text-embedding-3-large
  dimensions: 3072
  cost_per_1k_tokens: 0.00013
