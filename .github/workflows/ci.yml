name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/ --output-format=github

      - name: Format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install sqlglot redis httpx

      - name: Import smoke test
        run: |
          python -c "from src.raven.pipeline import Pipeline; print('Pipeline import OK')"
          python -c "from src.raven.contracts import InstructionCompiler, InstructionSet; print('Contracts import OK')"
          python -c "from src.raven.query_families import QueryFamilyRegistry, FamilyProvenance; print('QF import OK')"
          python -c "from src.raven.sql import TrinoSQLCompiler; print('SQL compiler import OK')"
          python -c "from src.raven.validation import ConfidenceModel; print('Validation import OK')"
          python -c "from src.raven.grounding import AmbiguityPolicy, ValueIndex; print('Grounding import OK')"
          python -c "from src.raven.redis_cache import RedisCache, HybridCache; print('Redis cache import OK')"

      - name: Run tests
        run: |
          python -m pytest tests/ -x -q --tb=short 2>&1

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install sqlglot redis httpx

      - name: Validate test sets
        run: python -m src.raven.eval.benchmark_gate --validate-only

      - name: Run benchmark gate
        run: python -m src.raven.eval.benchmark_gate --max-pass-rate-drop 2.0 --max-latency-increase 5.0
