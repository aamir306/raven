# RAVEN — Docker Compose for local development
# Usage: docker compose up -d

services:
  # ── pgvector: Embedding store ────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: raven-pgvector
    environment:
      POSTGRES_DB: raven
      POSTGRES_USER: raven
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-raven_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raven"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RAVEN API ────────────────────────────────────────────────────────
  raven:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raven-api
    depends_on:
      pgvector:
        condition: service_healthy
    environment:
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID:-}

      # Trino
      TRINO_HOST: ${TRINO_HOST:-localhost}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_USER: ${TRINO_USER:-raven}
      TRINO_CATALOG: ${TRINO_CATALOG:-iceberg}
      TRINO_SCHEMA: ${TRINO_SCHEMA:-gold_dbt}

      # pgvector (inside Docker network)
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: 5432
      PGVECTOR_DB: raven
      PGVECTOR_USER: raven
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD:-raven_dev}

      # RAVEN config
      RAVEN_LOG_LEVEL: ${RAVEN_LOG_LEVEL:-INFO}
      RAVEN_MAX_RETRIES: ${RAVEN_MAX_RETRIES:-2}
      RAVEN_API_KEY: ${RAVEN_API_KEY:-}
      RAVEN_RATE_LIMIT_RPM: ${RAVEN_RATE_LIMIT_RPM:-60}
      RAVEN_CORS_ORIGINS: ${RAVEN_CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./data:/app/data
    restart: unless-stopped

  # ── RAVEN UI (React frontend) ───────────────────────────────────────
  ui:
    build:
      context: ./web/ui
      dockerfile: Dockerfile
    container_name: raven-ui
    depends_on:
      - raven
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgvector_data:
