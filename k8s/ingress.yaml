apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raven-ingress
  namespace: raven
  labels:
    app: raven
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: raven.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: raven-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: raven-ui
                port:
                  number: 80
